apiVersion: v1
kind: pod
metada:
 name : empty-directory
spec:
 containers:
  #container-1
  - image: nginx
    name: nginx
    volumeMounts:
    - mountpath: /var/log/nginx
      name: nginx
  #container-2
  - image: almalinux:9
    name: almalinux
    command: ["sleep","2000"]
    volumeMounts:
    - mountpath: /mnt/nginx-logs
      name: nginx-logs
      readOnly: true
#This is at the pod level   
volumes:
 - name: nginx-logs
   emptyDir:
   sizeLimit: 500mi


  